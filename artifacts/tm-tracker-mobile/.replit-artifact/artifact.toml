kind = "mobile"
previewPath = "/mobile/"
title = "TM Tracker Mobile"
version = "1.0.0"
id = "artifacts/tm-tracker-mobile"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/mobile/" ]
localPort = 25449

[services.development]
run = "pnpm --filter @workspace/tm-tracker-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tm-tracker-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/tm-tracker-mobile", "run", "serve" ]

[services.env]
PORT = "25449"
BASE_PATH = "/mobile/"
